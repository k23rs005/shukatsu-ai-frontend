<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>はじめに — 就活AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/onboarding.css" />
</head>
<body class="ob-body-wrap">

  <div class="ob-outer">

    <!-- ロゴ -->
    <div class="ob-logo">
      <i class="ti ti-robot"></i>就活AI
    </div>

    <!-- カード -->
    <div class="ob-card">

      <!-- プログレス -->
      <div class="ob-progress">
        <div class="prog-bar">
          <div class="prog-fill" id="progFill" style="width:33%"></div>
        </div>
        <span class="prog-label" id="progLabel">1 / 3</span>
      </div>

      <!-- コンテンツ -->
      <div class="ob-body" id="obBody"></div>

      <!-- ドット -->
      <div class="ob-dots">
        <div class="ob-dot active" id="dot0"></div>
        <div class="ob-dot" id="dot1"></div>
        <div class="ob-dot" id="dot2"></div>
        <div class="ob-dot" id="dot3"></div>
      </div>

      <!-- フッター -->
      <div class="ob-footer">
        <button class="ob-back" id="backBtn" onclick="prevStep()">
          <i class="ti ti-arrow-left"></i>戻る
        </button>
        <button class="ob-next" id="nextBtn" onclick="nextStep()" disabled>
          次へ <i class="ti ti-arrow-right"></i>
        </button>
      </div>

    </div>
  </div>

  <script src="../js/onboarding.js"></script>
</body>
</html>
