<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企業一覧｜就活AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/company.css" />
</head>
<body>
  <div class="comp-page">

    <!-- ヘッダー -->
    <header class="comp-header">
      <a href="../index.html" class="comp-back" aria-label="戻る">
        <i class="ti ti-arrow-left"></i>
      </a>
      <h1 class="comp-title">登録企業一覧</h1>
    </header>

    <main class="comp-main">

      <!-- 検索フィルター -->
      <section class="comp-filter">
        <h2 class="comp-filter-title">
          <i class="ti ti-filter"></i> 条件で絞り込み
        </h2>

        <div class="comp-filter-grid">
          <!-- 業界 -->
          <div class="comp-filter-field">
            <label>業界</label>
            <select id="filterIndustry">
              <option value="">すべて</option>
              <option value="IT">IT</option>
              <option value="製造">製造</option>
              <option value="金融">金融</option>
              <option value="教育">教育</option>
              <option value="小売">小売</option>
              <option value="サービス">サービス</option>
              <option value="コンサル">コンサル</option>
              <option value="メディア">メディア</option>
              <option value="医療">医療</option>
              <option value="建設">建設</option>
              <option value="エネルギー">エネルギー</option>
            </select>
          </div>

          <!-- リモート -->
          <div class="comp-filter-field">
            <label>リモート可否</label>
            <select id="filterRemote">
              <option value="">指定なし</option>
              <option value="full">フルリモート可</option>
              <option value="partial">一部リモート可</option>
              <option value="none">出社</option>
            </select>
          </div>

          <!-- 年間休日 -->
          <div class="comp-filter-field">
            <label>年間休日</label>
            <select id="filterHolidays">
              <option value="">指定なし</option>
              <option value="115">115日以上</option>
              <option value="120">120日以上</option>
              <option value="125">125日以上</option>
            </select>
          </div>

          <!-- 残業 -->
          <div class="comp-filter-field">
            <label>月平均残業</label>
            <select id="filterOvertime">
              <option value="">指定なし</option>
              <option value="20">20時間以内</option>
              <option value="25">25時間以内</option>
              <option value="30">30時間以内</option>
            </select>
          </div>

          <!-- 転勤 -->
          <div class="comp-filter-field">
            <label>転勤</label>
            <select id="filterTransfer">
              <option value="">指定なし</option>
              <option value="なし">転勤なし</option>
              <option value="あり">転勤あり</option>
            </select>
          </div>

          <!-- 文理 -->
          <div class="comp-filter-field">
            <label>文理</label>
            <select id="filterScience">
              <option value="">指定なし</option>
              <option value="不問">不問</option>
              <option value="文系">文系</option>
              <option value="理系">理系</option>
            </select>
          </div>
        </div>

        <div class="comp-filter-actions">
          <button id="searchBtn" class="comp-search-btn">
            <i class="ti ti-search"></i> 検索する
          </button>
          <button id="resetBtn" class="comp-reset-btn">
            <i class="ti ti-refresh"></i> リセット
          </button>
        </div>
      </section>

      <!-- 検索結果 -->
      <section class="comp-results">
        <div class="comp-results-header">
          <h2 class="comp-results-title">検索結果</h2>
          <span class="comp-results-count" id="resultsCount">読み込み中...</span>
        </div>

        <div class="comp-grid" id="companyGrid">
          <div class="comp-loading">読み込み中...</div>
        </div>
      </section>

    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/company.js"></script>
</body>
</html>
